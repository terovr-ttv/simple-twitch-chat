<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Twitch Chat Monitor</title>
<style>
  :root {
    --bg: #0e0e10;
    --bg-elev: #18181b;
    --bg-input: #1f1f23;
    --border: #2d2d35;
    --text: #efeff1;
    --text-muted: #adadb8;
    --accent: #9147ff;
    --accent-hover: #772ce8;
    --danger: #eb0400;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    height: 100%;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
    line-height: 1.5;
  }
  /* Chat font size is independent of header chrome so the controls stay compact. */
  #chat { font-size: var(--chat-font-size, 13px); }
  #chat .emote { height: calc(var(--chat-font-size, 13px) * 2.15); }
  body {
    display: flex;
    flex-direction: column;
  }
  header {
    background: var(--bg-elev);
    border-bottom: 1px solid var(--border);
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  header h1 {
    margin: 0;
    font-size: 14px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-right: auto;
  }
  input[type="text"] {
    background: var(--bg-input);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 7px 10px;
    border-radius: 4px;
    font-size: 13px;
    outline: none;
    width: 200px;
  }
  input[type="text"]:focus {
    border-color: var(--accent);
  }
  button {
    background: var(--accent);
    color: white;
    border: none;
    padding: 7px 14px;
    border-radius: 4px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  button:hover { background: var(--accent-hover); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  button.secondary {
    background: var(--bg-input);
    color: var(--text);
    border: 1px solid var(--border);
  }
  button.secondary:hover { background: var(--border); }

  #status {
    font-size: 12px;
    color: var(--text-muted);
    padding: 0 6px;
  }
  #status .dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #555;
    margin-right: 6px;
    vertical-align: middle;
  }
  #status.connected .dot { background: #00d26a; }
  #status.connecting .dot { background: #f5a623; animation: pulse 1s infinite; }
  #status.error .dot { background: var(--danger); }
  @keyframes pulse { 50% { opacity: 0.3; } }

  #chat-wrapper {
    flex: 1;
    position: relative;
    overflow: hidden;
  }
  #chat {
    height: 100%;
    overflow-y: auto;
    padding: 8px 12px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  #chat::-webkit-scrollbar { width: 8px; }
  #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .msg {
    padding: 4px 4px;
    word-wrap: break-word;
    word-break: break-word;
    border-bottom: 1px solid transparent;
  }
  .msg:hover { background: rgba(255,255,255,0.03); }
  .msg .name {
    font-weight: 700;
  }
  .msg .name::after { content: ":"; color: var(--text); font-weight: 400; }
  .msg .text { color: var(--text); }
  .msg .emote {
    height: 28px;
    vertical-align: middle;
    margin: -4px 1px;
  }
  .badge {
    display: inline-block;
    font-size: 9px;
    font-weight: 700;
    padding: 1px 4px;
    border-radius: 2px;
    margin-right: 4px;
    color: white;
    vertical-align: middle;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }
  .badge img {
    height: 18px;
    width: 18px;
    vertical-align: middle;
    margin: -3px 0;
  }
  .badge.broadcaster { background: #e91916; }
  .badge.moderator { background: #00ad03; }
  .badge.vip { background: #e005b9; }
  .badge.subscriber { background: #6441a5; }
  .badge.founder { background: #ff4500; }
  .badge.premium { background: #00a0d2; }
  .badge.turbo { background: #6441a5; }
  .badge.partner { background: #9147ff; padding: 1px 3px; }
  .badge.staff { background: #200f33; }
  .badge.admin { background: #faaf19; }
  .badge.global_mod { background: #0c6f20; }
  .badge.bits { background: #ce0c0c; }
  .badge.verified { background: #1d9bf0; }
  .badge.default { background: #555; }

  .msg.system {
    color: var(--text-muted);
    font-style: italic;
    padding: 6px 4px;
  }
  .msg.action .text { font-style: italic; }

  #pause-indicator {
    position: absolute;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--accent);
    color: white;
    padding: 6px 14px;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 600;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    cursor: pointer;
    display: none;
  }
  #pause-indicator.visible { display: block; }

  /* Teleprompter mode: mirror everything horizontally so it reads correctly
     when viewed in the reflective glass of a teleprompter rig. */
  body.teleprompter #chat {
    transform: scaleX(-1);
    transform-origin: center;
  }
  /* Also mirror the pause pill so its text reads correctly in the mirror,
     while keeping it visually centered. */
  body.teleprompter #pause-indicator {
    transform: translateX(-50%) scaleX(-1);
  }
  #teleprompter-btn.active,
  #invert-btn.active {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }
</style>
</head>
<body>
  <header>
    <h1>Chat Monitor</h1>
    <span id="status"><span class="dot"></span><span id="status-text">Disconnected</span></span>
    <input type="text" id="channel-input" placeholder="Twitch channel name" autocomplete="off" spellcheck="false" />
    <button id="connect-btn">Connect</button>
    <button id="disconnect-btn" class="secondary" style="display:none">Disconnect</button>
    <button id="font-dec" class="secondary" title="Decrease chat font size">A-</button>
    <button id="font-inc" class="secondary" title="Increase chat font size">A+</button>
    <button id="invert-btn" class="secondary" title="Invert chat direction (newest on top)">Invert</button>
    <button id="teleprompter-btn" class="secondary" title="Toggle teleprompter mode (mirror display)">Teleprompter</button>
  </header>
  <div id="chat-wrapper">
    <div id="chat"></div>
    <div id="pause-indicator">Scroll paused — click to resume</div>
  </div>

<script>
(() => {
  const channelInput = document.getElementById('channel-input');
  const connectBtn = document.getElementById('connect-btn');
  const disconnectBtn = document.getElementById('disconnect-btn');
  const statusEl = document.getElementById('status');
  const statusText = document.getElementById('status-text');
  const chat = document.getElementById('chat');
  const chatWrapper = document.getElementById('chat-wrapper');
  const pauseIndicator = document.getElementById('pause-indicator');

  const STORAGE_KEY = 'twitch-chat-monitor-channel';
  const TELEPROMPTER_KEY = 'twitch-chat-monitor-teleprompter';
  const REVERSE_KEY = 'twitch-chat-monitor-reverse';
  const FONT_SIZE_KEY = 'twitch-chat-monitor-font-size';
  const MAX_MESSAGES = 250;
  const FONT_MIN = 10;
  const FONT_MAX = 64;

  let ws = null;
  let currentChannel = null;
  let autoScroll = true;
  let isPaused = false;
  let reconnectAttempts = 0;
  let intentionalClose = false;
  let reverseDirection = localStorage.getItem(REVERSE_KEY) === '1';

  // Restore last channel
  const savedChannel = localStorage.getItem(STORAGE_KEY);
  if (savedChannel) channelInput.value = savedChannel;

  // Restore teleprompter mode
  const teleprompterBtn = document.getElementById('teleprompter-btn');
  if (localStorage.getItem(TELEPROMPTER_KEY) === '1') {
    document.body.classList.add('teleprompter');
    teleprompterBtn.classList.add('active');
  }
  teleprompterBtn.addEventListener('click', () => {
    const on = document.body.classList.toggle('teleprompter');
    teleprompterBtn.classList.toggle('active', on);
    localStorage.setItem(TELEPROMPTER_KEY, on ? '1' : '0');
    if (autoScroll) scrollToNewest();
  });

  // Font size controls (chat only — header stays compact)
  let chatFontSize = parseInt(localStorage.getItem(FONT_SIZE_KEY), 10);
  if (!Number.isFinite(chatFontSize)) chatFontSize = 13;
  function applyFontSize() {
    chatFontSize = Math.max(FONT_MIN, Math.min(FONT_MAX, chatFontSize));
    document.documentElement.style.setProperty('--chat-font-size', chatFontSize + 'px');
    localStorage.setItem(FONT_SIZE_KEY, String(chatFontSize));
    if (autoScroll) scrollToNewest();
  }
  applyFontSize();
  document.getElementById('font-inc').addEventListener('click', () => { chatFontSize += 2; applyFontSize(); });
  document.getElementById('font-dec').addEventListener('click', () => { chatFontSize -= 2; applyFontSize(); });

  // Restore + wire up invert toggle
  const invertBtn = document.getElementById('invert-btn');
  if (reverseDirection) invertBtn.classList.add('active');
  invertBtn.addEventListener('click', () => {
    reverseDirection = !reverseDirection;
    localStorage.setItem(REVERSE_KEY, reverseDirection ? '1' : '0');
    invertBtn.classList.toggle('active', reverseDirection);
    // Reverse existing DOM children so chat history stays in chronological order
    // relative to the new direction (newest visually adjacent to the newest edge).
    const children = Array.from(chat.children);
    for (const c of children) chat.removeChild(c);
    for (const c of children.reverse()) chat.appendChild(c);
    autoScroll = true;
    scrollToNewest();
    pauseIndicator.classList.remove('visible');
  });

  function setStatus(state, text) {
    statusEl.className = state;
    statusText.textContent = text;
  }

  function addSystemMessage(text) {
    const div = document.createElement('div');
    div.className = 'msg system';
    div.textContent = text;
    appendMessage(div);
  }

  function appendMessage(node) {
    if (reverseDirection) {
      chat.insertBefore(node, chat.firstChild);
      while (chat.children.length > MAX_MESSAGES) {
        chat.removeChild(chat.lastChild);
      }
    } else {
      chat.appendChild(node);
      while (chat.children.length > MAX_MESSAGES) {
        chat.removeChild(chat.firstChild);
      }
    }
    if (autoScroll) scrollToNewest();
  }

  function scrollToNewest() {
    chat.scrollTop = reverseDirection ? 0 : chat.scrollHeight;
  }

  // Pause auto-scroll when user scrolls away from the "newest" edge.
  function checkAtNewest() {
    if (reverseDirection) return chat.scrollTop < 30;
    return chat.scrollHeight - chat.scrollTop - chat.clientHeight < 30;
  }

  chatWrapper.addEventListener('mouseenter', () => {
    isPaused = true;
    if (!checkAtNewest()) {
      autoScroll = false;
      pauseIndicator.classList.add('visible');
    }
  });
  chatWrapper.addEventListener('mouseleave', () => {
    isPaused = false;
    autoScroll = true;
    pauseIndicator.classList.remove('visible');
    scrollToNewest();
  });
  chat.addEventListener('scroll', () => {
    if (isPaused) {
      if (checkAtNewest()) {
        autoScroll = true;
        pauseIndicator.classList.remove('visible');
      } else {
        autoScroll = false;
        pauseIndicator.classList.add('visible');
      }
    }
  });
  pauseIndicator.addEventListener('click', () => {
    autoScroll = true;
    scrollToNewest();
    pauseIndicator.classList.remove('visible');
  });

  // ---- IRC tag parsing ----
  function parseTags(tagString) {
    const tags = {};
    if (!tagString) return tags;
    for (const part of tagString.split(';')) {
      const eq = part.indexOf('=');
      if (eq === -1) {
        tags[part] = '';
      } else {
        const k = part.slice(0, eq);
        let v = part.slice(eq + 1);
        // Unescape IRCv3 tag values
        v = v.replace(/\\:/g, ';').replace(/\\s/g, ' ').replace(/\\\\/g, '\\').replace(/\\r/g, '\r').replace(/\\n/g, '\n');
        tags[k] = v;
      }
    }
    return tags;
  }

  function parseMessage(line) {
    let tags = {};
    let prefix = null;
    let rest = line;

    if (rest.startsWith('@')) {
      const sp = rest.indexOf(' ');
      tags = parseTags(rest.slice(1, sp));
      rest = rest.slice(sp + 1);
    }
    if (rest.startsWith(':')) {
      const sp = rest.indexOf(' ');
      prefix = rest.slice(1, sp);
      rest = rest.slice(sp + 1);
    }

    const trailingIdx = rest.indexOf(' :');
    let params, trailing = null;
    if (trailingIdx !== -1) {
      params = rest.slice(0, trailingIdx).split(' ');
      trailing = rest.slice(trailingIdx + 2);
    } else {
      params = rest.split(' ');
    }
    const command = params.shift();
    if (trailing !== null) params.push(trailing);

    return { tags, prefix, command, params };
  }

  // ---- Badge rendering ----
  // Use text badges (no API call needed). Map known badge IDs to CSS classes / short labels.
  const BADGE_LABELS = {
    broadcaster: 'HOST',
    moderator: 'MOD',
    vip: 'VIP',
    subscriber: 'SUB',
    founder: 'FNDR',
    premium: 'PRIME',
    turbo: 'TURBO',
    partner: '✓',
    staff: 'STAFF',
    admin: 'ADMIN',
    global_mod: 'GMOD',
    bits: 'BITS',
    'no_audio': '🔇',
    'no_video': '📷',
  };

  function renderBadges(badgesTag) {
    if (!badgesTag) return '';
    const out = [];
    for (const b of badgesTag.split(',')) {
      const [id] = b.split('/');
      const cls = BADGE_LABELS[id] ? id : 'default';
      const label = BADGE_LABELS[id] || id.slice(0, 3).toUpperCase();
      out.push(`<span class="badge ${cls}">${escapeHtml(label)}</span>`);
    }
    return out.join('');
  }

  // ---- Emote rendering ----
  // emotes tag: "id:start-end,start-end/id:start-end"
  function renderMessageWithEmotes(text, emotesTag) {
    // Twitch positions are based on UTF-16 code points in the visible message.
    // Use Array.from to handle surrogate pairs correctly.
    const chars = Array.from(text);
    if (!emotesTag) return escapeHtml(chars.join(''));

    // Collect replacements: array of {start, end, id}
    const replacements = [];
    for (const emote of emotesTag.split('/')) {
      const [id, ranges] = emote.split(':');
      if (!ranges) continue;
      // Twitch emote IDs are alphanumeric/underscore. Skip anything else to keep
      // the id safe to interpolate into an <img src="..."> URL.
      if (!/^[A-Za-z0-9_]+$/.test(id)) continue;
      for (const range of ranges.split(',')) {
        const [start, end] = range.split('-').map(Number);
        if (!Number.isFinite(start) || !Number.isFinite(end) || end < start) continue;
        replacements.push({ start, end, id });
      }
    }
    replacements.sort((a, b) => a.start - b.start);

    let html = '';
    let i = 0;
    for (const r of replacements) {
      if (r.start > i) {
        html += escapeHtml(chars.slice(i, r.start).join(''));
      }
      const emoteText = chars.slice(r.start, r.end + 1).join('');
      const url = `https://static-cdn.jtvnw.net/emoticons/v2/${r.id}/default/dark/1.0`;
      html += `<img class="emote" src="${url}" alt="${escapeHtml(emoteText)}" title="${escapeHtml(emoteText)}" />`;
      i = r.end + 1;
    }
    if (i < chars.length) {
      html += escapeHtml(chars.slice(i).join(''));
    }
    return html;
  }

  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    })[c]);
  }

  // Generate a fallback color from username (Twitch does similar)
  const FALLBACK_COLORS = ['#FF0000','#0000FF','#00FF00','#B22222','#FF7F50','#9ACD32','#FF4500','#2E8B57','#DAA520','#D2691E','#5F9EA0','#1E90FF','#FF69B4','#8A2BE2','#00FF7F'];
  function fallbackColor(name) {
    let hash = 0;
    for (let i = 0; i < name.length; i++) hash = (hash * 31 + name.charCodeAt(i)) & 0xffffffff;
    return FALLBACK_COLORS[Math.abs(hash) % FALLBACK_COLORS.length];
  }

  function handlePrivmsg(msg) {
    const tags = msg.tags;
    const channel = msg.params[0];
    let text = msg.params[1] || '';

    // /me action: ACTION text
    let isAction = false;
    if (text.startsWith('ACTION ') && text.endsWith('')) {
      isAction = true;
      text = text.slice(8, -1);
    }

    const username = tags['display-name'] || (msg.prefix && msg.prefix.split('!')[0]) || 'unknown';
    const rawColor = tags['color'];
    // Only trust strict #RRGGBB. Defense-in-depth against CSS injection via the
    // style attribute if the color tag ever arrives malformed.
    const color = (rawColor && /^#[0-9A-Fa-f]{6}$/.test(rawColor))
      ? rawColor
      : fallbackColor(username.toLowerCase());

    const div = document.createElement('div');
    div.className = 'msg' + (isAction ? ' action' : '');

    const badgesHtml = renderBadges(tags['badges']);
    const messageHtml = renderMessageWithEmotes(text, tags['emotes']);

    div.innerHTML =
      badgesHtml +
      `<span class="name" style="color:${escapeHtml(color)}">${escapeHtml(username)}</span> ` +
      `<span class="text"${isAction ? ` style="color:${escapeHtml(color)}"` : ''}>${messageHtml}</span>`;

    appendMessage(div);
  }

  // ---- WebSocket / IRC ----
  // Twitch usernames are 4-25 chars, [a-z0-9_]. Validate before connecting so
  // typos surface as a clear error instead of a silent join failure.
  const VALID_CHANNEL = /^[a-z0-9_]{4,25}$/;

  function connect(channel) {
    channel = channel.toLowerCase().replace(/^#/, '').trim();
    if (!channel) return;
    if (!VALID_CHANNEL.test(channel)) {
      setStatus('error', 'Invalid channel name');
      addSystemMessage(`"${channel}" is not a valid Twitch channel name (4-25 chars, letters/numbers/underscore).`);
      return;
    }

    currentChannel = channel;
    localStorage.setItem(STORAGE_KEY, channel);
    intentionalClose = false;

    setStatus('connecting', `Connecting to #${channel}...`);
    connectBtn.style.display = 'none';
    disconnectBtn.style.display = '';
    channelInput.disabled = true;

    const nick = 'justinfan' + Math.floor(Math.random() * 100000);
    ws = new WebSocket('wss://irc-ws.chat.twitch.tv:443');

    ws.addEventListener('open', () => {
      ws.send('CAP REQ :twitch.tv/tags twitch.tv/commands');
      ws.send('PASS SCHMOOPIIE');
      ws.send('NICK ' + nick);
      ws.send('JOIN #' + channel);
    });

    ws.addEventListener('message', (event) => {
      const lines = event.data.split('\r\n').filter(Boolean);
      for (const line of lines) {
        const msg = parseMessage(line);
        handleIrcMessage(msg, line);
      }
    });

    ws.addEventListener('error', () => {
      setStatus('error', 'Connection error');
    });

    ws.addEventListener('close', () => {
      if (intentionalClose) {
        setStatus('', 'Disconnected');
        connectBtn.style.display = '';
        disconnectBtn.style.display = 'none';
        channelInput.disabled = false;
        return;
      }
      // Auto-reconnect with backoff
      reconnectAttempts++;
      const delay = Math.min(30000, 1000 * Math.pow(2, Math.min(reconnectAttempts, 5)));
      setStatus('error', `Connection lost. Reconnecting in ${Math.round(delay/1000)}s...`);
      addSystemMessage(`Connection lost. Reconnecting in ${Math.round(delay/1000)}s...`);
      setTimeout(() => {
        if (!intentionalClose && currentChannel) connect(currentChannel);
      }, delay);
    });
  }

  function handleIrcMessage(msg, raw) {
    switch (msg.command) {
      case 'PING':
        ws.send('PONG :' + (msg.params[0] || 'tmi.twitch.tv'));
        break;
      case '001': // Welcome
        break;
      case 'JOIN':
        if (msg.prefix && msg.prefix.startsWith('justinfan')) {
          setStatus('connected', `Connected to #${currentChannel}`);
          addSystemMessage(`Joined #${currentChannel}`);
          reconnectAttempts = 0;
        }
        break;
      case 'PRIVMSG':
        handlePrivmsg(msg);
        break;
      case 'CLEARCHAT':
        if (msg.params.length > 1) {
          addSystemMessage(`${msg.params[1]} was timed out / banned`);
        } else {
          addSystemMessage('Chat was cleared by a moderator');
        }
        break;
      case 'CLEARMSG':
        addSystemMessage(`A message was deleted`);
        break;
      case 'NOTICE':
        addSystemMessage(`Notice: ${msg.params[1] || raw}`);
        break;
      case 'USERNOTICE':
        // Subs, raids, etc.
        if (msg.tags && msg.tags['system-msg']) {
          addSystemMessage(msg.tags['system-msg']);
        }
        break;
      case 'RECONNECT':
        addSystemMessage('Server requested reconnect...');
        ws.close();
        break;
    }
  }

  function disconnect() {
    intentionalClose = true;
    if (ws) ws.close();
    ws = null;
    currentChannel = null;
  }

  // ---- UI handlers ----
  connectBtn.addEventListener('click', () => {
    const ch = channelInput.value.trim();
    if (!ch) return;
    chat.innerHTML = '';
    connect(ch);
  });
  disconnectBtn.addEventListener('click', disconnect);
  channelInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') connectBtn.click();
  });

  // URL hash deep-link: #channel auto-connects on load. Useful for OBS browser
  // sources or bookmarks. The hash takes precedence over the localStorage value.
  function autoConnectFromHash() {
    const hash = window.location.hash.replace(/^#/, '').trim().toLowerCase();
    if (!hash) return;
    channelInput.value = hash;
    connectBtn.click();
  }
  window.addEventListener('hashchange', () => {
    disconnect();
    autoConnectFromHash();
  });
  autoConnectFromHash();
})();
</script>
</body>
</html>
